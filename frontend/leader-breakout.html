<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股龙头股回调新高统计</title>
    <style>
        :root {
            --apple-bg: #000000;
            --apple-surface-1: #272729;
            --apple-surface-2: #262628;
            --apple-text-primary: #ffffff;
            --apple-text-secondary: rgba(255, 255, 255, 0.6);
            --apple-text-tertiary: rgba(255, 255, 255, 0.4);
            --apple-blue: #0071e3;
            --apple-divider: rgba(255, 255, 255, 0.12);
            --apple-card-shadow: rgba(0, 0, 0, 0.22) 3px 5px 30px 0px;
            --data-positive: #30d158;
            --data-negative: #ff453a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--apple-bg);
            color: var(--apple-text-primary);
            letter-spacing: -0.01em;
            min-height: 100vh;
        }

        /* ─── Header ─── */
        .header {
            position: sticky; top: 0; z-index: 100;
            height: 48px; padding: 0 24px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.8);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            backdrop-filter: saturate(180%) blur(20px);
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .header h1 { font-size: 17px; font-weight: 600; }

        .nav-links { display: flex; gap: 20px; }

        .nav-links a {
            font-size: 13px; color: var(--apple-text-secondary);
            text-decoration: none; transition: color 0.15s;
        }

        .nav-links a:hover { color: var(--apple-text-primary); }

        @keyframes spin { to { transform: rotate(360deg); } }

        .spinner {
            width: 20px; height: 20px;
            border: 2px solid var(--apple-divider);
            border-top-color: var(--apple-text-secondary);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }

        /* ─── Main ─── */
        .main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

        /* ─── Controls ─── */
        .controls-bar {
            display: flex; align-items: center; gap: 10px;
            flex-wrap: wrap; margin-bottom: 20px;
        }

        .control-label { font-size: 12px; color: var(--apple-text-tertiary); }

        .ctrl-input, .ctrl-btn {
            padding: 7px 12px;
            background: var(--apple-surface-1);
            border: 1px solid var(--apple-divider);
            border-radius: 8px; color: var(--apple-text-primary);
            font-size: 13px; outline: none; transition: border-color 0.15s ease;
        }

        .ctrl-input:focus { border-color: var(--apple-blue); outline: 2px solid var(--apple-blue); outline-offset: 1px; }

        .ctrl-btn {
            cursor: pointer; white-space: nowrap; padding: 7px 14px;
        }
        .ctrl-btn:hover { border-color: var(--apple-blue); }
        .ctrl-btn.primary { background: var(--apple-blue); border-color: var(--apple-blue); color: #fff; }
        .ctrl-btn.primary:hover { opacity: 0.85; }

        /* ─── Summary grid ─── */
        .summary-grid {
            display: grid; grid-template-columns: repeat(6, 1fr);
            gap: 12px; padding: 16px 0;
        }

        .summary-item {
            text-align: center; padding: 12px 8px;
            background: var(--apple-surface-2); border-radius: 8px;
        }

        .summary-label { font-size: 11px; color: var(--apple-text-tertiary); margin-bottom: 4px; }

        .summary-val { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }

        /* ─── Table ─── */
        .table-wrap {
            overflow-x: auto; border-radius: 12px;
            background: var(--apple-surface-1);
            box-shadow: var(--apple-card-shadow);
        }

        .data-table {
            width: 100%; border-collapse: collapse; font-size: 13px;
        }

        .data-table th {
            padding: 10px 14px; font-weight: 600; font-size: 12px;
            color: var(--apple-text-tertiary); text-transform: uppercase;
            letter-spacing: 0.3px; text-align: right; white-space: nowrap;
            border-bottom: 1px solid var(--apple-divider);
        }

        .data-table th:first-child { text-align: left; }

        .data-table td {
            padding: 8px 14px; text-align: right;
            border-bottom: 1px solid var(--apple-divider);
            font-variant-numeric: tabular-nums; white-space: nowrap;
        }

        .data-table td:first-child { text-align: left; color: var(--apple-text-secondary); }

        .data-table tr:last-child td { border-bottom: none; }

        /* ─── Error / Loading ─── */
        .error-box {
            padding: 12px 16px;
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid rgba(255, 69, 58, 0.3);
            border-radius: 8px; color: var(--data-negative);
            font-size: 13px; margin-bottom: 12px; display: none;
        }

        .loading-row {
            display: flex; align-items: center; gap: 10px;
            color: var(--apple-text-secondary); font-size: 13px;
            padding: 8px 0; display: none;
        }

        /* ─── Progress bar ─── */
        .progress-wrap { display: none; margin-bottom: 12px; }

        .progress-track {
            width: 100%; height: 4px; border-radius: 2px;
            background: var(--apple-surface-1); overflow: hidden;
        }

        .progress-fill {
            height: 100%; border-radius: 2px;
            background: var(--apple-blue); transition: width 0.3s ease;
        }

        .progress-text { font-size: 12px; color: var(--apple-text-secondary); margin-top: 6px; }

        /* ─── Result ─── */
        .result-wrap { display: none; }

        .empty-state { display: none; text-align: center; padding: 24px; color: var(--apple-text-secondary); font-size: 13px; }

        @media (max-width: 768px) { .summary-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 480px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1>🐉 A股龙头股回调冲击新高统计</h1>
        </div>
        <nav class="nav-links">
            <a href="/">← 历年涨跌幅</a>
        </nav>
    </header>

    <main class="main">
        <div style="font-size:12px;color:var(--apple-text-tertiary);margin-bottom:16px;">
            沪深主板 · 不含ST/创业板/科创板 · 连续涨停≥6天 · 按首次涨停日期从近到远排列
        </div>

        <div class="controls-bar">
            <span class="control-label">开始日期</span>
            <input type="date" id="lbStartDate" class="ctrl-input" style="width:150px;" value="2024-09-30">
            <span class="control-label">涨停阈值</span>
            <input type="number" id="lbThreshold" class="ctrl-input" value="9.5" min="0" max="10" step="0.1" style="width:80px;">
            <span style="font-size:12px;color:var(--apple-text-tertiary);">%</span>
            <span class="control-label">最少连续</span>
            <input type="number" id="lbMinDays" class="ctrl-input" value="6" min="2" max="30" step="1" style="width:70px;">
            <span style="font-size:12px;color:var(--apple-text-tertiary);">天</span>
            <button id="lbRunBtn" class="ctrl-btn primary">开始扫描</button>
            <button id="lbExportBtn" class="ctrl-btn" style="display:none;">📥 导出Excel</button>
        </div>

        <div class="progress-wrap" id="lbProgressWrap">
            <div class="progress-track">
                <div class="progress-fill" id="lbProgress" style="width:0%;"></div>
            </div>
            <div class="progress-text" id="lbProgressText">扫描中...</div>
        </div>

        <div class="error-box" id="lbError"></div>

        <div class="loading-row" id="lbLoading">
            <div class="spinner"></div>
            <span>全市场扫描中，预计约2分钟...</span>
        </div>

        <div class="result-wrap" id="lbResult">
            <div id="lbSummary"></div>
            <div class="empty-state" id="lbEmpty"></div>
            <div class="table-wrap" id="lbTableWrap">
                <table class="data-table">
                    <thead><tr id="lbTableHead"></tr></thead>
                    <tbody id="lbTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/leader-breakout.js"></script>
</body>
</html>
