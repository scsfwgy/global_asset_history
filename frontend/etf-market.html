<script>
(function() {
    function setMeta(name, value) {
        var el = document.querySelector('meta[name="' + name + '"]');
        if (el) el.setAttribute('content', value);
    }
    function setPropertyMeta(property, value) {
        var el = document.querySelector('meta[property="' + property + '"]');
        if (el) el.setAttribute('content', value);
    }
    function applySiteBaseUrl(rawUrl) {
        var baseUrl = rawUrl ? String(rawUrl).replace(/\/$/, '') : '';
        if (!baseUrl) return;
        window.__GAH_SITE_BASE_URL__ = baseUrl;
        var pageUrl = baseUrl + '/etf-market';
        var imageUrl = baseUrl + '/doc/screenshot/yearly-chart.png';
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) canonical.href = pageUrl;
        setPropertyMeta('og:url', pageUrl);
        setPropertyMeta('og:image', imageUrl);
        setMeta('twitter:image', imageUrl);
        document.querySelectorAll('script[type="application/ld+json"]').forEach(function(script) {
            try {
                var data = JSON.parse(script.textContent);
                data.url = pageUrl;
                if (data.isPartOf) data.isPartOf.url = baseUrl + '/';
                script.textContent = JSON.stringify(data);
            } catch (_) {}
        });
    }
    fetch('/api/price-change/config')
        .then(function(resp) { return resp.ok ? resp.json() : null; })
        .then(function(cfg) {
            applySiteBaseUrl(cfg && cfg.site && cfg.site.base_url);
        })
        .catch(function() {});
})();
</script>

<!-- Custom instant tooltip (replaces slow native title tooltip) -->
<script>
(function() {
    var tipEl = null, activeEl = null, savedTitle = null;
    function ensureTip() {
        if (tipEl) return;
        tipEl = document.createElement('div');
        tipEl.className = 'custom-tip';
        document.body.appendChild(tipEl);
    }
    function show(e, el) {
        ensureTip();
        if (activeEl === el) return;
        hide();
        var text = el.getAttribute('title');
        if (!text) return;
        activeEl = el;
        savedTitle = text;
        el.removeAttribute('title');
        tipEl.textContent = text;
        tipEl.style.display = 'block';
        reposition(e);
    }
    function hide() {
        if (activeEl && savedTitle != null) activeEl.setAttribute('title', savedTitle);
        activeEl = null;
        savedTitle = null;
        if (tipEl) tipEl.style.display = 'none';
    }
    function reposition(e) {
        if (!tipEl || tipEl.style.display === 'none') return;
        var x = e.clientX + 12, y = e.clientY - 36;
        var rect = tipEl.getBoundingClientRect();
        if (x + rect.width + 10 > window.innerWidth) x = e.clientX - rect.width - 12;
        if (y < 10) y = e.clientY + 16;
        tipEl.style.left = x + 'px';
        tipEl.style.top = y + 'px';
    }
    document.addEventListener('mouseover', function(e) {
        var el = e.target.closest('.has-tip');
        if (el && el.getAttribute('title')) show(e, el);
        else if (!e.target.closest('.has-tip')) hide();
    });
    document.addEventListener('mousemove', function(e) {
        if (!activeEl) return;
        if (e.target.closest('.has-tip') === activeEl) reposition(e);
    });
    document.addEventListener('mouseout', function(e) {
        if (!activeEl) return;
        if (!activeEl.contains(e.relatedTarget)) hide();
    });
})();
</script>
